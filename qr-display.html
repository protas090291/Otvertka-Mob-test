<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-код для подключения к Expo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .url {
            color: #667eea;
            font-size: 18px;
            font-weight: 600;
            margin: 20px 0;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            word-break: break-all;
        }
        .qr-code {
            margin: 30px 0;
            display: flex;
            justify-content: center;
        }
        .instructions {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
            text-align: left;
        }
        .instructions h3 {
            margin-top: 0;
            color: #333;
        }
        .instructions ol {
            margin: 10px 0;
            padding-left: 20px;
        }
        .instructions li {
            margin: 8px 0;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 QR-код для подключения</h1>
        <div class="url">exp://192.168.1.140:8081</div>
        <div class="qr-code">
            <img src="qr-code.png" alt="QR Code" style="max-width: 100%; height: auto;">
        </div>
        <div class="instructions">
            <h3>Как использовать:</h3>
            <ol>
                <li>Откройте приложение Expo Go на вашем телефоне</li>
                <li>Нажмите "Scan QR Code"</li>
                <li>Отсканируйте QR-код выше</li>
                <li>Дождитесь загрузки приложения</li>
            </ol>
        </div>
    </div>
</body>
</html>
